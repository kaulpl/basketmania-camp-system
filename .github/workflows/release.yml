name: Build plugin release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress

      - name: Verify DOMPDF
        run: php -r "require 'vendor/autoload.php'; if (!class_exists('Dompdf\\Dompdf')) { fwrite(STDERR, 'DOMPDF is missing from the release build.'); exit(1); }"

      - name: Prepare plugin directory
        run: |
          mkdir -p build/basketmania-camp-system
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            ./ build/basketmania-camp-system/

      - name: Verify release package contents
        run: |
          test -f build/basketmania-camp-system/vendor/autoload.php
          test -d build/basketmania-camp-system/vendor/dompdf/dompdf

      - name: Create ZIP
        run: |
          cd build
          zip -r "basketmania-camp-system-${GITHUB_REF_NAME#v}.zip" basketmania-camp-system

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/basketmania-camp-system-*.zip
          generate_release_notes: true
